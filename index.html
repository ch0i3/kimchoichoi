<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <title>온라인 도량</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>
<body>
  <!-- 입장 화면 -->
  <section id="enter">
    <p class="enter-brand">온라인 템플스테이</p>
    <h1 class="enter-title">비움</h1>
    <img id="enterJar" class="enter-jar" alt="" />
    <div class="enter-form">
      <input id="nameInput" maxlength="12" placeholder="이름을 적어주세요 (익명 · 저장 안 됨)" />
      <button id="enterBtn">들어가기</button>
    </div>
  </section>

  <!-- 머무는 중 -->
  <main id="app" class="hidden">
    <div id="pager"><!-- 채널 페이지는 main.js 에서 생성 --></div>

    <button id="hamburger" aria-label="채널 전환">
      <svg width="24" height="18" viewBox="0 0 24 18" fill="none">
        <path d="M1 1h22M1 9h22M1 17h22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <button id="muteBtn" aria-label="소리 끄기">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
        <g class="waves">
          <path d="M16 8.8a4.2 4.2 0 010 6.4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
          <path d="M18.8 6.2a7.6 7.6 0 010 11.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </g>
        <line class="slash" x1="4" y1="3.5" x2="21" y2="20.5" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>
      </svg>
    </button>

    <div id="presence">
      <section id="statusBar" class="closed">
        <button id="statusHead" aria-expanded="false">
          <span id="statusCount">함께 머무는 중…</span>
          <svg class="caret" width="17" height="9" viewBox="0 0 17 9" fill="none" aria-hidden="true">
            <path d="M1 1l7.5 7 7.5-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="status-body"><div class="status-inner">
          <div class="status-divider"></div>
          <ul id="rosterList"></ul>
        </div></div>
      </section>
    </div>

    <div id="indicator"></div>

    <div id="ripples"></div>

    <div id="scrim"></div>
    <nav id="sidebar">
      <button id="sidebarClose" aria-label="닫기">✕</button>
      <p class="sidebar-label">채널</p>
      <ul id="channelList"></ul>
      <p id="sidebarFooter"></p>
    </nav>
  </main>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
